# Alembic Migration Environment Configuration
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relative to this file's directory)
script_location = infra/alembic

# Template used to generate migration file names.
# Prefix with timestamp for readable ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path search path — prepend project root so engine.* imports work
prepend_sys_path = .

# Timezone for %%(year)d etc. in file_template
timezone = UTC

# Max length for the "slug" portion of the filename
truncate_slug_length = 40

# Whether to allow empty migrations
# Set to false for discipline
revision_environment = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
