version: "3.9"

# =============================================================================
# ShipFaster — Local Development Stack
# =============================================================================
# Run: docker-compose up -d
# Brings up: PostgreSQL, Redis, MinIO
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: shipfaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shipfaster
      POSTGRES_USER: shipfaster
      POSTGRES_PASSWORD: shipfaster_dev_password
      PGDATA: /data/postgres
    ports:
      # If you have another Postgres running (e.g. EvalPro), change host port
      - "5434:5432"
    volumes:
      - postgres_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipfaster -d shipfaster"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shipfaster

  # ---------------------------------------------------------------------------
  # Redis — Celery broker + result backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: shipfaster-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shipfaster

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for artifacts
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: shipfaster-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console (http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - shipfaster

  # ---------------------------------------------------------------------------
  # MinIO Init — Creates default bucket on first run
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: shipfaster-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/shipfaster-artifacts --ignore-existing &&
      mc anonymous set download local/shipfaster-artifacts &&
      echo 'MinIO bucket initialized successfully'
      "
    networks:
      - shipfaster

# --- Volumes ---
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# --- Networks ---
networks:
  shipfaster:
    driver: bridge
